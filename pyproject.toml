[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "poe-agent"
version = "0.1.0"
description = "A terminal AI agent for Path of Exile"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "httpx>=0.27.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
    "ddgs>=7.0.0",
    "beautifulsoup4>=4.12.0",
    "InquirerPy>=0.3.4",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
poechat = "poe_agent.main:main"
